<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            width: 100vw;
        }

        img{
            width: 100vw;
        }

        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
        }

        a {
            display: block;

            background-color: darkred;
            color: white;
            text-align: center;
            font-size: bolder;
            text-decoration: none;
            padding: 20px;
        }

        a:hover {
            background-color: red;
            border: 2px solid white;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <img src="pacote-d013/imagens/tela-youtube.png" alt="print tela youtube">
    <a href="https://www.youtube.com/@CursoemVideo" target="_blank">ACESSAR</a>
</body>
</html>
