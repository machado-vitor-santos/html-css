<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form autocomplete="on" action="" method="post"></form>
    <p>
        <label for="usu">Usuário:</label> <input type="text" name="usu" id="usu" required>
    </p>
    <p>
        <label for="senha">Senha:</label><input type="password" name="senha" id="senha" required>
    </p>
    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
    <!--
        Neste caso estou usando p, mas geralmente usa-se a Div
    -->
</body>
</html>
