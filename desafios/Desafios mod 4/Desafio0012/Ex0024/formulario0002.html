<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 02</title>
</head>

<body>
    <h1>Formulários</h1>
    <form action="" method="post" autocomplete="on">
        <p>
            <label for="usu">Usuário:</label>
            <input type="text" name="usu" id="usu" required minlength="5" maxlength="15" size="22" placeholder="Digite seu nome do usuário...">
        </p>
        <p>
            <label for="senha">Senha:</label> 
            <input type="password" name="senha" id="senha" required minlength="8" maxlength="30" size="22" placeholder="Digite sua senha...">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>

</html>
