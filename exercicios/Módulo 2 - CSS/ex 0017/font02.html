<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: Medieval;
            src: url(OldLondon.ttf) format('truetype');
            font-weight: normal;
            font-style: normal;
        }

            /*
            @font-face {
            font-family: 'Love';
            src: url(Candy\ Kisses.ttf) format('truetype');
            font-weight: normal;
            font-style: normal;

                Tipos de format()
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Advanced Typography)
                -svg
            */
        
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Medieval', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Deserunt repellat, officiis provident praesentium laboriosam iure, explicabo nihil voluptatum exercitationem sed earum recusandae eius. Deleniti maiores architecto nostrum ipsa recusandae vel!</p>
</body>
</html>
