<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 400px;
        }

        caption{
            background-color: gray;
            color: white;
            padding: 5px 0px 5px 0px;
        }

        th{
            border: 1px solid black;
            padding: 5px 0px 5px 0px;
            text-align: center;
        }

        td{
            border: 1px solid black;
            padding: 5px 0px 5px 5px;
        }

        .c-nome{
            background-color: greenyellow;
        }

        .c-grupo{
            background-color: yellow;
        }


    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>

    <table>
        <colgroup>  <!--modificação de estilos em colunas-->
            <col class="c-nome"> <!-- Criação de uma <col> para cada coluna e atribuição de uma class-->
            <col span="2" class="c-grupo"> <!-- Modificação simultânea de duas colunas com a o span="n(colunas)"-->
            <col class="c-prof"> 
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td> Ana Maria</td>
            <td>F</td>
            <td>52</td>
            <td>Bailarina</td>
        </tr>
        <tr>
            <td>Robertson</td>
            <td>M</td>
            <td>34</td>
            <td>Carpinteiro</td>
        </tr>
        <tr>
            <td>Gleisa</td>
            <td>F</td>
            <td>19</td>
            <td>Atleta</td>
        </tr>
        <tr class="destaque">
            <td>Marcos</td>
            <td>M</td>
            <td>32</td>
            <td>Advogado</td>
        </tr>
        <tr>
            <td>filisbino</td>
            <td>M</td>
            <td>44</td>
            <td>Empresário</td>
        </tr>
    </table>
</body>
</html>
