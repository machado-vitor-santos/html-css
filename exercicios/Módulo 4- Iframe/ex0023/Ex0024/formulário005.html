<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário 5</title>
</head>
<body>
    <form action="" method="get" autocomplete="on">
        <fieldset>
            <!-- 
                Radio para um ou autro, desde que respeitada a condição do mesmo nome.
            -->
            <legend>Sexo</legend>
            <input type="radio" name="sex" id="ifem"> <label for="ifem">Feminino</label>
            <input type="radio" name="sex" id="imasc"> <label for="imasc">Masculino</label>
            <!-- Para que o preenchimento seja entre uma ou outra opção, basta que ambas possuam o mesmo nome "name".-->
        </fieldset>
        <fieldset>
            <!--
                Checkbox para um e outro.
            -->
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="fut" id="ifut"> <label for="ifut">Futebol</label> <br>
            <input type="checkbox" name="vol" id="ivol"> <label for="ivol">Volêibol</label> <br>
            <input type="checkbox" name="atl" id="iatl"> <label for="iatl">Atletismo</label> <br>
            <input type="checkbox" name="jdo" id="ijdo"> <label for="ijdo">Judô</label> <br>
            <input type="checkbox" name="gin" id="igin"> <label for="igin">Ginástica</label> <br>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
