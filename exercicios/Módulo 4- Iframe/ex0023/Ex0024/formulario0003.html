<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomulário 3</title>
</head>

<body>
    <h1>Teste de fomulário</h1>
    <form action="Ação ou script" method="post" autocomplete="on">
        <p>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" required maxlength="20" minlength="5"
                placeholder="Digite seu nome completo..." autocomplete="name" size="30">
        </p>
        <p>
            <label for="media">Média:</label>
            <input type="number" name="media" id="media" required max="20" min="2" size="30" step="0.1" placeholder="Digite sua primeira nota..." required value="5">
        </p>
        <p>
            <label for="mes">Período Letivo:</label>
            <input type="month" name="mes" id="mes" required value="2020-07">
            <!--
                no input month - value"ano-mês-dia"
            -->
        </p>
        <p>
            <label for="diap">Dia da Prova:</label>
            <input type="month" name="diap" id="diap" value="1998-10" required>
        </p>
        <p>
            <label for="hora">Horário da Prova:</label>
            <input type="time" name="hora" id="hora" required value="08:30">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        <!--
            Diferentes navegadores habilitam ou não alguns campos de input - necessário testar antes.
            
            Para o teste: 
            pode-se mandar para o GitHub e de lá mandar o link
            que poderá ser aberto em diferentes navegadores.
        -->
    </form>
</body>

</html>
