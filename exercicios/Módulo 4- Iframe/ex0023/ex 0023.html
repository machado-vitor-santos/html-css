<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <h1>Testando o uso de um iframe</h1>
    <p>
        Acessando o site do <br>
        <!--Tamanho padrão do iframe é de (300x150)px-->
        <iframe src="https://www.cursoemvideo.com" frameborder="0">
            <a href="https://www.cursoemvideo.com" target="_blank">CursoemVídeo</a>
            <!--Dentro ta Tag inline do iframe caso não carregue, como no caso de alguns dispositivos móveis, será carregada a mensagem do conteúdo interno. Neste caso o link CursoemVídeo.-->
        </iframe>
        <br>
        para aprender a programar.
    </p>

    <p>
        O Repositório do Guanabara <br>

        <iframe src="https://gustavoguanabara.github.io" frameborder="0">
            <a href="https://gustavoguanabara.github.io" target="_blank">Repositório GitHub</a>
        </iframe>
        <br>
        é bem legal também.
    </p>
</body>

</html>
